<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bitcoin Price Prediction</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="left">
      <h2>Bitcoin Price Prediction</h2>
      <label>
        <span>🎯 Target Price (USDT):</span>
        <input type="number" id="target-price" placeholder="e.g. 104800">
      </label>
      <label>
        <span>⏰ Target Time (dd.mm.yyyy hh:mm):</span>
        <input type="text" id="target-time" placeholder="14.06.2025 18:45">
      </label>
      <button onclick="predictPrice()">Predict</button>
      <div id="prediction-result"></div>
    </div>

    <div class="right">
      <div id="tv-widget"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/technicalindicators@3.0.0/dist/browser/technicalindicators.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
