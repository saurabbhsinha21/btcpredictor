<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bitcoin Price Prediction</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/technicalindicators@3.0.0/dist/browser/technicalindicators.min.js"></script>
  <script src="script.js" defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .container {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .left, .right {
      width: 48%;
    }
    input {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
    }
    button {
      padding: 8px 16px;
    }
    .result {
      margin-top: 20px;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    .emoji {
      font-size: 1.2em;
      margin-right: 5px;
    }
    .highlight {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Bitcoin Price Prediction</h2>
  <div class="container">
    <div class="left">
      <label>🎯 Target Price (USDT):</label><br />
      <input type="number" id="target-price" placeholder="e.g. 103900" /><br />
      <label>🕒 Target Time (dd.mm.yyyy hh:mm):</label><br />
      <input type="text" id="target-time" placeholder="14.06.2025 18:45" /><br />
      <button onclick="predictPrice()">Predict</button>

      <div class="result" id="prediction-result"></div>
    </div>

    <div class="right">
      <!-- TradingView Widget -->
      <div id="tv-widget-container" style="height: 400px;"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
      <script type="text/javascript">
        new TradingView.widget({
          autosize: true,
          symbol: "BINANCE:BTCUSDT",
          interval: "1",
          timezone: "Asia/Kolkata",
          theme: "light",
          style: "1",
          locale: "en",
          toolbar_bg: "#f1f3f6",
          enable_publishing: false,
          allow_symbol_change: true,
          container_id: "tv-widget-container"
        });
      </script>
    </div>
  </div>
</body>
</html>
